<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://thymeleaf.org"
      th:fragment="main-layout(content)">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Estudiantes</title>
    <!-- CSS (Identidad) Boostrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://jsdelivr.net">
    <style>
        /* Aquí puedes agregar tu CSS personalizado para la 'Identidad' */
        .bg-custom-blue { background-color: #007bff !important; }
        .card { border-radius: 15px; }
        .navbar { margin-bottom: 30px; background-color: #007bff !important;box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15); border: none; }
        .navbar-brand, .nav-link {color: #ffffff !important;}
        .text-primary { color: #0056b3 !important; }
        .texto-listado { 
            font-weight: 600;
            color: #444;
        }
        .form-check-input:checked {
            background-color: #0d6efd;
            border-color: #0d6efd;
        }
    </style>
</head>
<body class="bg-light">

    <!-- Navbar Dinámica -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">EduGestion</a>
            
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <!-- ACCESO PARA ADMIN Y USER (Asesores): Ambos pueden listar -->
                    <li class="nav-item dropdown" sec:authorize="hasAnyRole('ADMIN', 'USER')">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Gestión</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" th:href="@{/cursos/lista}">Listado de Cursos</a></li>
                            <li><a class="dropdown-item" th:href="@{/estudiantes/lista}">Listado de Estudiantes</a></li>
                        </ul>
                    </li>

                    <!-- Solo visible para ESTUDIANTES (Rol STUDENT): Basado en tu carpeta Students/ -->
                    <li class="nav-item" sec:authorize="hasRole('STUDENT')">
                        <a class="nav-link" th:href="@{/Students/dashboard}">Mi Portal Estudiante</a>
                    </li>
                </ul>

                    
                <!-- Información de sesión y Logout -->
                <div class="d-flex align-items-center text-white">
                    <span class="me-3" sec:authorize="isAuthenticated()">
                        Hola, <span sec:authentication="name">Usuario</span> 
                        <small class="badge bg-secondary ms-1" sec:authentication="principal.authorities">Rol</small>
                    </span>
                    <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
                        <!-- Importante: Spring Security requiere que el logout sea POST -->
                        <button class="btn btn-outline-danger btn-sm" type="submit">Cerrar Sesión</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <!-- El contenido dinámico se insertará aquí -->
        <div th:replace="${content}"></div>
    </div>

    <!-- JS Común -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
