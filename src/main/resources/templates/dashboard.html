<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" 
      th:replace="~{layout :: main-layout(~{::section})}">

    <section>
        <div class="container mt-4">
            <h2 class="text-primary mb-4 border-bottom pb-2">
                <i class="bi bi-speedometer2"></i> Panel de Control
            </h2>

            <div class="row g-4">
                <!-- Tarjeta Estudiantes -->
                <div class="col-md-6 col-lg-4">
                    <div class="card h-100 shadow-sm border-0 border-bottom border-primary border-4 rounded-4 p-3 text-center">
                        <div class="card-body">
                            <div class="display-4 text-primary mb-3">
                                <i class="bi bi-people-fill"></i>
                            </div>
                            <h3 class="card-title fw-bold">Estudiantes</h3>
                            <p class="text-muted small">Administración de matrícula, datos personales y estados académicos.</p>
                            <a th:href="@{/estudiantes}" class="btn btn-outline-primary rounded-pill px-4 mt-2">
                                Gestionar Estudiantes
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Tarjeta Cursos -->
                <div class="col-md-6 col-lg-4">
                    <div class="card h-100 shadow-sm border-0 border-bottom border-info border-4 rounded-4 p-3 text-center">
                        <div class="card-body">
                            <div class="display-4 text-info mb-3">
                                <i class="bi bi-journal-bookmark-fill"></i>
                            </div>
                            <h3 class="card-title fw-bold">Cursos</h3>
                            <p class="text-muted small">Configuración de catálogo, descripciones y disponibilidad de cursos.</p>
                            <a th:href="@{/cursos}" class="btn btn-outline-info rounded-pill px-4 mt-2">
                                Gestionar Cursos
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Tarjeta Reportes (Opcional como relleno visual) -->
                <div class="col-md-6 col-lg-4">
                    <div class="card h-100 shadow-sm border-0 border-bottom border-secondary border-4 rounded-4 p-3 text-center opacity-75">
                        <div class="card-body">
                            <div class="display-4 text-secondary mb-3">
                                <i class="bi bi-bar-chart-fill"></i>
                            </div>
                            <h3 class="card-title fw-bold">Reportes</h3>
                            <p class="text-muted small">Próximamente: Estadísticas y reportes de gestión institucional.</p>
                            <button class="btn btn-outline-secondary rounded-pill px-4 mt-2" disabled>
                                Próximamente
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</html>
